<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenClaw Mission Control</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🦞</text></svg>">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Login Screen -->
  <div id="login-screen" class="login-screen">
    <div class="login-box">
      <div class="login-logo">🦞</div>
      <h2>Mission Control</h2>
      <p>Finhouse AI — Private Dashboard</p>
      <input type="password" id="login-password" placeholder="Şifre girin..." autofocus>
      <button id="login-btn" onclick="checkLogin()">Giriş</button>
      <div id="login-error" class="login-error"></div>
    </div>
  </div>

  <div class="app" id="app-container" style="display:none">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-logo">
        <span class="logo-icon">🦞</span>
        <span>Mission Control</span>
      </div>
      <nav class="sidebar-nav">
        <div class="nav-item active" data-page="dashboard">
          <span class="nav-icon">📊</span> <span>Dashboard</span>
        </div>
        <div class="nav-item" data-page="agents">
          <span class="nav-icon">🤖</span> <span>Agents</span>
        </div>
        <div class="nav-item" data-page="skills">
          <span class="nav-icon">⚡</span> <span>Skills</span>
        </div>
        <div class="nav-item" data-page="projects">
          <span class="nav-icon">📁</span> <span>Projects</span>
        </div>
        <div class="nav-item" data-page="timeline">
          <span class="nav-icon">📅</span> <span>Timeline</span>
        </div>
        <div class="nav-item" data-page="settings">
          <span class="nav-icon">⚙️</span> <span>Settings</span>
        </div>
      </nav>
    </aside>

    <!-- Main -->
    <div class="main-wrapper">
      <header class="topbar">
        <div class="topbar-left">
          <button id="sidebar-toggle">☰</button>
          <h1 id="page-title">Dashboard</h1>
        </div>
        <div class="topbar-right">
          <input type="text" id="global-search" placeholder="Search...">
          <span class="topbar-icon">🔔</span>
          <div class="topbar-avatar">🦞</div>
        </div>
      </header>
      <main class="content">
        <div id="main-content"></div>
      </main>
    </div>
  </div>

  <!-- Modal overlay -->
  <div id="modal-overlay" onclick="if(event.target===this)UI.closeModal()"></div>

  <!-- Toast container -->
  <div id="toast-container"></div>

  <!-- Auth + Scripts -->
  <script>
    // Simple client-side auth (hash-based)
    const AUTH_HASH = '1c8675cfeb9da2dca0151fe82e133338f0ff347d3d575bef1d565c61443f2697';
    async function sha256(msg){const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(msg));return[...new Uint8Array(buf)].map(b=>b.toString(16).padStart(2,'0')).join('')}
    async function checkLogin(){
      const pw=document.getElementById('login-password').value;
      const hash=await sha256(pw);
      if(hash===AUTH_HASH){
        localStorage.setItem('mc_auth','1');
        localStorage.setItem('mc_auth_ts',Date.now().toString());
        showApp();
      } else {
        document.getElementById('login-error').textContent='Yanlış şifre!';
        document.getElementById('login-password').value='';
      }
    }
    function showApp(){
      document.getElementById('login-screen').style.display='none';
      document.getElementById('app-container').style.display='';
      if(typeof Store!=='undefined') Store.init();
      if(typeof Router!=='undefined') Router.init();
    }
    function checkAuth(){
      const ts=parseInt(localStorage.getItem('mc_auth_ts')||'0');
      if(localStorage.getItem('mc_auth')==='1' && (Date.now()-ts)<7*24*60*60*1000){showApp();return true}
      return false;
    }
    document.getElementById('login-password').addEventListener('keydown',e=>{if(e.key==='Enter')checkLogin()});
    checkAuth();
  </script>
  <script src="js/store.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/router.js"></script>
  <script src="js/agents.js"></script>
  <script src="js/skills.js"></script>
  <script src="js/projects.js"></script>
  <script src="js/timeline.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
